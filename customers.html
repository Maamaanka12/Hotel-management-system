<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customers | Grand Hotel</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100">

  <div id="sidebar-overlay" class="fixed inset-0 z-40 hidden bg-black/50 lg:hidden"></div>

  <div class="flex min-h-screen">
    <aside id="sidebar-panel"
           class="fixed inset-y-0 left-0 z-50 w-64 -translate-x-full transform bg-slate-800 transition-transform duration-300 lg:static lg:translate-x-0">
      <div id="sidebar-navigation" class="h-full"></div>
    </aside>

    <div class="flex flex-1 flex-col">
      <header class="flex items-center justify-between border-b border-slate-200 bg-white px-4 py-4 lg:px-8">
        <div class="flex items-center gap-4">
          <button id="mobile-menu-toggle" class="rounded-lg p-2 text-slate-600 hover:bg-slate-100 lg:hidden">
            <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
            </svg>
          </button>
          <h2 class="text-xl font-bold text-slate-800">Customers Management</h2>
        </div>
        <button id="open-add-customer-button"
                class="rounded-lg bg-indigo-600 px-4 py-2 text-sm font-semibold text-white hover:bg-indigo-700">
          + Add Customer
        </button>
      </header>

      <main class="flex-1 p-4 lg:p-8">
        <div id="alert-container"></div>

        <div class="rounded-xl bg-white shadow-sm border border-slate-200">
          <div class="overflow-x-auto">
            <table class="w-full text-left text-sm">
              <thead class="bg-slate-50 text-xs uppercase text-slate-500">
                <tr>
                  <th class="px-6 py-3">Name</th>
                  <th class="px-6 py-3">Phone</th>
                  <th class="px-6 py-3">Email</th>
                  <th class="px-6 py-3">National ID</th>
                  <th class="px-6 py-3">Face Enrolled</th>
                  <th class="px-6 py-3 text-right">Actions</th>
                </tr>
              </thead>
              <tbody id="customers-table-body">
                <tr>
                  <td colspan="6" class="px-6 py-8 text-center text-slate-400">No customers added yet</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- Add/Edit Customer Modal -->
  <div id="customer-modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/50 p-4">
    <div class="w-full max-w-md rounded-xl bg-white p-6 shadow-xl">
      <h3 id="customer-modal-title" class="mb-4 text-lg font-semibold text-slate-800">Add Customer</h3>
      <form id="customer-form" class="space-y-4">
        <input type="hidden" id="customer-edit-id">
        <div>
          <label for="customer-name" class="mb-1 block text-sm font-medium text-slate-700">Full Name *</label>
          <input type="text" id="customer-name" required
                 class="w-full rounded-lg border border-slate-300 px-4 py-2 text-sm focus:border-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-200">
        </div>
        <div>
          <label for="customer-phone" class="mb-1 block text-sm font-medium text-slate-700">Phone Number *</label>
          <input type="tel" id="customer-phone" required
                 class="w-full rounded-lg border border-slate-300 px-4 py-2 text-sm focus:border-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-200">
        </div>
        <div>
          <label for="customer-email" class="mb-1 block text-sm font-medium text-slate-700">Email Address *</label>
          <input type="email" id="customer-email" required
                 class="w-full rounded-lg border border-slate-300 px-4 py-2 text-sm focus:border-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-200">
        </div>
        <div>
          <label for="customer-national-id" class="mb-1 block text-sm font-medium text-slate-700">National ID *</label>
          <input type="text" id="customer-national-id" required
                 class="w-full rounded-lg border border-slate-300 px-4 py-2 text-sm focus:border-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-200">
        </div>
        <div class="flex gap-3 pt-2">
          <button type="submit"
                  class="flex-1 rounded-lg bg-indigo-600 py-2.5 text-sm font-semibold text-white hover:bg-indigo-700">
            Save Customer
          </button>
          <button type="button" id="close-customer-modal-button"
                  class="flex-1 rounded-lg border border-slate-300 py-2.5 text-sm font-semibold text-slate-700 hover:bg-slate-50">
            Cancel
          </button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/database.js"></script>
  <script src="js/common.js"></script>
  <script src="js/customers.js"></script>
</body>
</html>
