<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bookings | Grand Hotel</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100">

  <div id="sidebar-overlay" class="fixed inset-0 z-40 hidden bg-black/50 lg:hidden"></div>

  <div class="flex min-h-screen">
    <aside id="sidebar-panel"
           class="fixed inset-y-0 left-0 z-50 w-64 -translate-x-full transform bg-slate-800 transition-transform duration-300 lg:static lg:translate-x-0">
      <div id="sidebar-navigation" class="h-full"></div>
    </aside>

    <div class="flex flex-1 flex-col">
      <header class="flex items-center justify-between border-b border-slate-200 bg-white px-4 py-4 lg:px-8">
        <div class="flex items-center gap-4">
          <button id="mobile-menu-toggle" class="rounded-lg p-2 text-slate-600 hover:bg-slate-100 lg:hidden">
            <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
            </svg>
          </button>
          <h2 class="text-xl font-bold text-slate-800">Bookings Management</h2>
        </div>
        <button id="open-add-booking-button"
                class="rounded-lg bg-indigo-600 px-4 py-2 text-sm font-semibold text-white hover:bg-indigo-700">
          + New Booking
        </button>
      </header>

      <main class="flex-1 p-4 lg:p-8">
        <div id="alert-container"></div>

        <div class="rounded-xl bg-white shadow-sm border border-slate-200">
          <div class="overflow-x-auto">
            <table class="w-full text-left text-sm">
              <thead class="bg-slate-50 text-xs uppercase text-slate-500">
                <tr>
                  <th class="px-6 py-3">Reference</th>
                  <th class="px-6 py-3">Customer</th>
                  <th class="px-6 py-3">Room</th>
                  <th class="px-6 py-3">Check-In</th>
                  <th class="px-6 py-3">Check-Out</th>
                  <th class="px-6 py-3">Status</th>
                  <th class="px-6 py-3 text-right">Actions</th>
                </tr>
              </thead>
              <tbody id="bookings-table-body">
                <tr>
                  <td colspan="7" class="px-6 py-8 text-center text-slate-400">No bookings yet</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- Add/Edit Booking Modal -->
  <div id="booking-modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/50 p-4">
    <div class="w-full max-w-lg rounded-xl bg-white p-6 shadow-xl">
      <h3 id="booking-modal-title" class="mb-4 text-lg font-semibold text-slate-800">New Booking</h3>
      <form id="booking-form" class="space-y-4">
        <input type="hidden" id="booking-edit-id">

        <div>
          <label for="booking-customer" class="mb-1 block text-sm font-medium text-slate-700">Select Customer *</label>
          <select id="booking-customer" required
                  class="w-full rounded-lg border border-slate-300 px-4 py-2 text-sm focus:border-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-200">
            <option value="">Choose a customer</option>
          </select>
        </div>

        <div>
          <label for="booking-room" class="mb-1 block text-sm font-medium text-slate-700">Select Room *</label>
          <select id="booking-room" required
                  class="w-full rounded-lg border border-slate-300 px-4 py-2 text-sm focus:border-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-200">
            <option value="">Choose a room</option>
          </select>
        </div>

        <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
          <div>
            <label for="booking-check-in" class="mb-1 block text-sm font-medium text-slate-700">Check-In Date *</label>
            <input type="date" id="booking-check-in" required
                   class="w-full rounded-lg border border-slate-300 px-4 py-2 text-sm focus:border-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-200">
          </div>
          <div>
            <label for="booking-check-out" class="mb-1 block text-sm font-medium text-slate-700">Check-Out Date *</label>
            <input type="date" id="booking-check-out" required
                   class="w-full rounded-lg border border-slate-300 px-4 py-2 text-sm focus:border-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-200">
          </div>
        </div>

        <div>
          <label for="booking-status" class="mb-1 block text-sm font-medium text-slate-700">Status *</label>
          <select id="booking-status" required
                  class="w-full rounded-lg border border-slate-300 px-4 py-2 text-sm focus:border-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-200">
            <option value="Active">Active</option>
            <option value="Completed">Completed</option>
            <option value="Cancelled">Cancelled</option>
          </select>
        </div>

        <p class="rounded-lg bg-indigo-50 px-4 py-3 text-xs text-indigo-700">
          Saving a new booking will redirect you to the Payments page so you can complete the payment at the same time.
        </p>

        <div class="flex flex-col gap-3 pt-2 sm:flex-row">
          <button type="submit" id="save-booking-button"
                  class="flex-1 rounded-lg bg-indigo-600 py-2.5 text-sm font-semibold text-white hover:bg-indigo-700">
            Save &amp; Go to Payment
          </button>
          <button type="button" id="close-booking-modal-button"
                  class="flex-1 rounded-lg border border-slate-300 py-2.5 text-sm font-semibold text-slate-700 hover:bg-slate-50">
            Cancel
          </button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/database.js"></script>
  <script src="js/common.js"></script>
  <script src="js/bookings.js"></script>
</body>
</html>
