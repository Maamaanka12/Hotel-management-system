<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Room Controls | Grand Hotel</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100">

  <div id="sidebar-overlay" class="fixed inset-0 z-40 hidden bg-black/50 lg:hidden"></div>

  <div class="flex min-h-screen">
    <aside id="sidebar-panel"
           class="fixed inset-y-0 left-0 z-50 w-64 -translate-x-full transform bg-slate-800 transition-transform duration-300 lg:static lg:translate-x-0">
      <div id="sidebar-navigation" class="h-full"></div>
    </aside>

    <div class="flex flex-1 flex-col">
      <header class="flex items-center gap-4 border-b border-slate-200 bg-white px-4 py-4 lg:px-8">
        <button id="mobile-menu-toggle" class="rounded-lg p-2 text-slate-600 hover:bg-slate-100 lg:hidden">
          <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        </button>
        <h2 class="text-xl font-bold text-slate-800">Smart Room Controls</h2>
      </header>

      <main class="flex-1 p-4 lg:p-8">
        <div id="alert-container"></div>

        <div class="mx-auto max-w-2xl">
          <div class="rounded-xl bg-white p-6 shadow-sm border border-slate-200 lg:p-8">

            <div class="mb-6">
              <label for="control-room-select" class="mb-2 block text-sm font-medium text-slate-700">Select Booked Room *</label>
              <select id="control-room-select"
                      class="w-full rounded-lg border border-slate-300 px-4 py-2.5 text-sm focus:border-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-200">
                <option value="">Choose a booked room</option>
              </select>
            </div>

            <!-- Room Info -->
            <div id="room-info-panel" class="mb-6 hidden rounded-lg bg-slate-50 p-4">
              <p class="text-sm text-slate-600"><span class="font-medium">Room:</span> <span id="control-room-number">—</span></p>
              <p class="text-sm text-slate-600"><span class="font-medium">Type:</span> <span id="control-room-type">—</span></p>
              <p class="text-sm text-slate-600"><span class="font-medium">Current Guest:</span> <span id="control-guest-name">—</span></p>
            </div>

            <!-- Control Toggles -->
            <div id="controls-panel" class="hidden space-y-4">

              <!-- Lights -->
              <div class="flex items-center justify-between rounded-xl border border-slate-200 p-4">
                <div class="flex items-center gap-3">
                  <span class="text-2xl">💡</span>
                  <div>
                    <p class="font-medium text-slate-800">Lights</p>
                    <p class="text-xs text-slate-500">Toggle room lighting</p>
                  </div>
                </div>
                <button id="toggle-lights-button"
                        class="relative h-7 w-12 rounded-full bg-slate-300 transition-colors duration-200">
                  <span id="lights-toggle-knob"
                        class="absolute left-0.5 top-0.5 h-6 w-6 rounded-full bg-white shadow transition-transform duration-200"></span>
                </button>
              </div>

              <!-- Air Conditioning -->
              <div class="flex items-center justify-between rounded-xl border border-slate-200 p-4">
                <div class="flex items-center gap-3">
                  <span class="text-2xl">❄️</span>
                  <div>
                    <p class="font-medium text-slate-800">Air Conditioning</p>
                    <p class="text-xs text-slate-500">Toggle AC unit</p>
                  </div>
                </div>
                <button id="toggle-ac-button"
                        class="relative h-7 w-12 rounded-full bg-slate-300 transition-colors duration-200">
                  <span id="ac-toggle-knob"
                        class="absolute left-0.5 top-0.5 h-6 w-6 rounded-full bg-white shadow transition-transform duration-200"></span>
                </button>
              </div>

              <!-- Door Lock -->
              <div class="flex items-center justify-between rounded-xl border border-slate-200 p-4">
                <div class="flex items-center gap-3">
                  <span class="text-2xl">🔒</span>
                  <div>
                    <p class="font-medium text-slate-800">Door Lock</p>
                    <p class="text-xs text-slate-500">Lock or unlock the room door</p>
                  </div>
                </div>
                <button id="toggle-door-lock-button"
                        class="relative h-7 w-12 rounded-full bg-slate-300 transition-colors duration-200">
                  <span id="door-lock-toggle-knob"
                        class="absolute left-0.5 top-0.5 h-6 w-6 rounded-full bg-white shadow transition-transform duration-200"></span>
                </button>
              </div>

            </div>

            <p id="no-booked-rooms-message" class="hidden text-center text-sm text-slate-400">
              No booked rooms available. Create an active booking first.
            </p>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="js/database.js"></script>
  <script src="js/common.js"></script>
  <script src="js/controls.js"></script>
</body>
</html>
