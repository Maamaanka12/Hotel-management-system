<!DOCTYPE html>
<html lang="en" class="bg-slate-100">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Staff Login | Grand Vista Hotel</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-slate-100 text-slate-800">
    <div class="flex min-h-screen items-center justify-center px-4 py-10">
      <div class="w-full max-w-md">
        <!-- Brand -->
        <div class="mb-8 text-center">
          <div class="mx-auto mb-4 flex h-14 w-14 items-center justify-center rounded-xl bg-teal-600 text-2xl font-bold text-white">
            GV
          </div>
          <h1 class="text-2xl font-bold text-slate-900">Grand Vista Hotel</h1>
          <p class="text-sm text-slate-500">Hotel Management System</p>
        </div>

        <div class="rounded-2xl bg-white p-8 shadow-sm ring-1 ring-slate-200">
          <!-- Tabs -->
          <div class="mb-6 flex rounded-lg bg-slate-100 p-1">
            <button
              id="loginTabButton"
              type="button"
              class="flex-1 rounded-md bg-white py-2 text-sm font-medium text-slate-900 shadow-sm"
            >
              Login
            </button>
            <button
              id="registerTabButton"
              type="button"
              class="flex-1 rounded-md py-2 text-sm font-medium text-slate-500"
            >
              Register
            </button>
          </div>

          <!-- Login Form -->
          <form id="loginForm" class="space-y-4">
            <div>
              <label class="mb-1 block text-sm font-medium text-slate-700">Email</label>
              <input
                type="email"
                id="loginEmail"
                class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none focus:border-teal-500 focus:ring-2 focus:ring-teal-100"
                placeholder="staff@hotel.com"
              />
            </div>
            <div>
              <label class="mb-1 block text-sm font-medium text-slate-700">Password</label>
              <input
                type="password"
                id="loginPassword"
                class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none focus:border-teal-500 focus:ring-2 focus:ring-teal-100"
                placeholder="••••••••"
              />
            </div>
            <button
              type="submit"
              class="w-full rounded-lg bg-teal-600 py-2.5 text-sm font-semibold text-white transition hover:bg-teal-700"
            >
              Sign In
            </button>
          </form>

          <!-- Register Form -->
          <form id="registerForm" class="hidden space-y-4">
            <div>
              <label class="mb-1 block text-sm font-medium text-slate-700">Full Name</label>
              <input
                type="text"
                id="registerName"
                class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none focus:border-teal-500 focus:ring-2 focus:ring-teal-100"
                placeholder="Jane Doe"
              />
            </div>
            <div>
              <label class="mb-1 block text-sm font-medium text-slate-700">Email</label>
              <input
                type="email"
                id="registerEmail"
                class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none focus:border-teal-500 focus:ring-2 focus:ring-teal-100"
                placeholder="staff@hotel.com"
              />
            </div>
            <div>
              <label class="mb-1 block text-sm font-medium text-slate-700">Password</label>
              <input
                type="password"
                id="registerPassword"
                class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none focus:border-teal-500 focus:ring-2 focus:ring-teal-100"
                placeholder="At least 4 characters"
              />
            </div>
            <button
              type="submit"
              class="w-full rounded-lg bg-teal-600 py-2.5 text-sm font-semibold text-white transition hover:bg-teal-700"
            >
              Create Account
            </button>
          </form>

          <!-- Feedback message -->
          <p id="authMessage" class="mt-4 hidden rounded-lg px-3 py-2 text-sm"></p>
        </div>

        <p class="mt-6 text-center text-xs text-slate-400">
          Data is stored locally in your browser.
        </p>
      </div>
    </div>

    <script src="database.js"></script>
    <script src="auth.js"></script>
  </body>
</html>
