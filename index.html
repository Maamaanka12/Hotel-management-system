<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Management System - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        hotel: {
                            primary: '#1e3a5f',
                            secondary: '#2d5a27',
                            accent: '#c4a747',
                            light: '#f4f1e8'
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gradient-to-br from-hotel-primary to-blue-900 min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <!-- Header -->
        <div class="text-center mb-8">
            <div class="text-6xl mb-4">🏨</div>
            <h1 class="text-3xl font-bold text-white mb-2">Grand Horizon Hotel</h1>
            <p class="text-gray-300">Management System</p>
        </div>

        <!-- Tab Buttons -->
        <div class="flex mb-6 bg-white rounded-lg p-1 shadow-lg">
            <button id="loginTabBtn" onclick="switchTab('login')" 
                    class="flex-1 py-3 px-4 rounded-md font-semibold transition-all duration-300 bg-hotel-primary text-white">
                Sign In
            </button>
            <button id="registerTabBtn" onclick="switchTab('register')" 
                    class="flex-1 py-3 px-4 rounded-md font-semibold transition-all duration-300 text-gray-600 hover:text-hotel-primary">
                Register
            </button>
        </div>

        <!-- Login Form -->
        <div id="loginForm" class="bg-white rounded-xl shadow-2xl p-8">
            <h2 class="text-2xl font-bold text-gray-800 mb-6">Welcome Back</h2>
            <form id="loginFormElement" onsubmit="handleLogin(event)" novalidate>
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-semibold mb-2">Email Address</label>
                    <input type="email" id="loginEmail" required 
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-hotel-primary focus:border-transparent"
                           placeholder="staff@hotel.com">
                </div>
                <div class="mb-6">
                    <label class="block text-gray-700 text-sm font-semibold mb-2">Password</label>
                    <input type="password" id="loginPassword" required 
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-hotel-primary focus:border-transparent"
                           placeholder="••••••••">
                </div>
                <button type="submit" 
                        class="w-full bg-hotel-primary text-white py-3 rounded-lg font-semibold hover:bg-blue-900 transition duration-300">
                    Sign In
                </button>
            </form>
        </div>

        <!-- Register Form -->
        <div id="registerForm" class="bg-white rounded-xl shadow-2xl p-8 hidden">
            <h2 class="text-2xl font-bold text-gray-800 mb-6">Create Account</h2>
            <form id="registerFormElement" onsubmit="handleRegister(event)" novalidate>
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-semibold mb-2">Full Name</label>
                    <input type="text" id="registerName" required 
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-hotel-primary focus:border-transparent"
                           placeholder="John Doe">
                </div>
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-semibold mb-2">Email Address</label>
                    <input type="email" id="registerEmail" required 
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-hotel-primary focus:border-transparent"
                           placeholder="staff@hotel.com">
                </div>
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-semibold mb-2">Password</label>
                    <input type="password" id="registerPassword" required minlength="6"
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-hotel-primary focus:border-transparent"
                           placeholder="Min 6 characters">
                </div>
                <div class="mb-6">
                    <label class="block text-gray-700 text-sm font-semibold mb-2">Confirm Password</label>
                    <input type="password" id="registerConfirmPassword" required minlength="6"
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-hotel-primary focus:border-transparent"
                           placeholder="Confirm your password">
                </div>
                <button type="submit" 
                        class="w-full bg-hotel-secondary text-white py-3 rounded-lg font-semibold hover:bg-green-800 transition duration-300">
                    Create Account
                </button>
            </form>
        </div>

        <!-- Alert Message -->
        <div id="alertMessage" class="mt-4 hidden"></div>
    </div>

    <script src="database.js"></script>
    <script src="auth.js"></script>
</body>
</html>
