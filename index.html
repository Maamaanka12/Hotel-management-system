<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Login | Grand Hotel</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 via-indigo-950 to-slate-900">

  <div class="flex min-h-screen items-center justify-center px-4 py-12">
    <div class="w-full max-w-md">

      <!-- Logo / Header -->
      <div class="mb-8 text-center">
        <div class="mx-auto mb-4 flex h-16 w-16 items-center justify-center rounded-2xl bg-indigo-600 text-3xl shadow-lg">
          🏨
        </div>
        <h1 class="text-3xl font-bold text-white">Grand Hotel</h1>
        <p class="mt-2 text-slate-400">Staff Management Portal</p>
      </div>

      <!-- Alert Messages -->
      <div id="auth-alert" class="mb-4 hidden rounded-lg border px-4 py-3 text-sm font-medium"></div>

      <!-- Auth Card -->
      <div class="rounded-2xl bg-white p-8 shadow-2xl">

        <!-- Tab Buttons -->
        <div class="mb-6 flex rounded-lg bg-slate-100 p-1">
          <button id="show-login-tab"
                  class="flex-1 rounded-md py-2 text-sm font-semibold transition bg-white text-indigo-700 shadow">
            Login
          </button>
          <button id="show-register-tab"
                  class="flex-1 rounded-md py-2 text-sm font-semibold transition text-slate-500 hover:text-slate-700">
            Register
          </button>
        </div>

        <!-- Login Form -->
        <form id="login-form" class="space-y-4">
          <div>
            <label for="login-email" class="mb-1 block text-sm font-medium text-slate-700">Email Address</label>
            <input type="email" id="login-email" required
                   class="w-full rounded-lg border border-slate-300 px-4 py-2.5 text-sm focus:border-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-200"
                   placeholder="staff@hotel.com">
          </div>
          <div>
            <label for="login-password" class="mb-1 block text-sm font-medium text-slate-700">Password</label>
            <input type="password" id="login-password" required minlength="6"
                   class="w-full rounded-lg border border-slate-300 px-4 py-2.5 text-sm focus:border-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-200"
                   placeholder="••••••••">
          </div>
          <button type="submit"
                  class="w-full rounded-lg bg-indigo-600 py-3 text-sm font-semibold text-white transition hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2">
            Sign In
          </button>
        </form>

        <!-- Register Form -->
        <form id="register-form" class="hidden space-y-4">
          <div>
            <label for="register-full-name" class="mb-1 block text-sm font-medium text-slate-700">Full Name</label>
            <input type="text" id="register-full-name" required
                   class="w-full rounded-lg border border-slate-300 px-4 py-2.5 text-sm focus:border-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-200"
                   placeholder="John Smith">
          </div>
          <div>
            <label for="register-email" class="mb-1 block text-sm font-medium text-slate-700">Email Address</label>
            <input type="email" id="register-email" required
                   class="w-full rounded-lg border border-slate-300 px-4 py-2.5 text-sm focus:border-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-200"
                   placeholder="staff@hotel.com">
          </div>
          <div>
            <label for="register-password" class="mb-1 block text-sm font-medium text-slate-700">Password</label>
            <input type="password" id="register-password" required minlength="6"
                   class="w-full rounded-lg border border-slate-300 px-4 py-2.5 text-sm focus:border-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-200"
                   placeholder="Minimum 6 characters">
          </div>
          <div>
            <label for="register-confirm-password" class="mb-1 block text-sm font-medium text-slate-700">Confirm Password</label>
            <input type="password" id="register-confirm-password" required minlength="6"
                   class="w-full rounded-lg border border-slate-300 px-4 py-2.5 text-sm focus:border-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-200"
                   placeholder="Repeat password">
          </div>
          <button type="submit"
                  class="w-full rounded-lg bg-indigo-600 py-3 text-sm font-semibold text-white transition hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2">
            Create Account
          </button>
        </form>

      </div>

      <p class="mt-6 text-center text-sm text-slate-500">
        Hotel Management System &mdash; Staff access only
      </p>
    </div>
  </div>

  <script src="js/database.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
