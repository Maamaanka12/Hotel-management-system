<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Face ID | Grand Hotel</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100">

  <div id="sidebar-overlay" class="fixed inset-0 z-40 hidden bg-black/50 lg:hidden"></div>

  <div class="flex min-h-screen">
    <aside id="sidebar-panel"
           class="fixed inset-y-0 left-0 z-50 w-64 -translate-x-full transform bg-slate-800 transition-transform duration-300 lg:static lg:translate-x-0">
      <div id="sidebar-navigation" class="h-full"></div>
    </aside>

    <div class="flex flex-1 flex-col">
      <header class="flex items-center gap-4 border-b border-slate-200 bg-white px-4 py-4 lg:px-8">
        <button id="mobile-menu-toggle" class="rounded-lg p-2 text-slate-600 hover:bg-slate-100 lg:hidden">
          <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        </button>
        <h2 class="text-xl font-bold text-slate-800">Face ID Enrollment</h2>
      </header>

      <main class="flex-1 p-4 lg:p-8">
        <div id="alert-container"></div>

        <div class="mx-auto max-w-2xl">
          <div class="rounded-xl bg-white p-6 shadow-sm border border-slate-200 lg:p-8">

            <div class="mb-6">
              <label for="face-customer-select" class="mb-2 block text-sm font-medium text-slate-700">Select Customer *</label>
              <select id="face-customer-select"
                      class="w-full rounded-lg border border-slate-300 px-4 py-2.5 text-sm focus:border-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-200">
                <option value="">Choose a customer to enroll</option>
              </select>
            </div>

            <!-- Simulated Webcam Area -->
            <div id="webcam-container"
                 class="relative mb-6 flex aspect-video items-center justify-center overflow-hidden rounded-xl bg-slate-900">
              <div id="webcam-idle" class="text-center">
                <div class="mb-3 text-5xl">📷</div>
                <p class="text-sm text-slate-400">Webcam preview will appear here</p>
              </div>
              <div id="webcam-scanning" class="hidden text-center">
                <div class="relative mx-auto mb-4 h-32 w-32">
                  <div class="absolute inset-0 animate-ping rounded-full border-4 border-indigo-400 opacity-30"></div>
                  <div class="absolute inset-4 animate-pulse rounded-full border-4 border-indigo-500"></div>
                  <div class="absolute inset-0 flex items-center justify-center text-5xl">👤</div>
                </div>
                <p class="text-sm font-medium text-indigo-300">Scanning face...</p>
                <div class="mx-auto mt-3 h-1.5 w-48 overflow-hidden rounded-full bg-slate-700">
                  <div id="scan-progress-bar" class="h-full w-0 rounded-full bg-indigo-500 transition-all duration-100"></div>
                </div>
              </div>
              <div id="webcam-success" class="hidden text-center">
                <div class="mb-3 text-5xl">✅</div>
                <p class="text-sm font-medium text-green-400">Face enrolled successfully!</p>
              </div>
            </div>

            <!-- Customer Info Panel -->
            <div id="customer-info-panel" class="mb-6 hidden rounded-lg bg-slate-50 p-4">
              <h4 class="mb-2 font-semibold text-slate-800">Customer Details</h4>
              <p class="text-sm text-slate-600"><span class="font-medium">Name:</span> <span id="info-customer-name">—</span></p>
              <p class="text-sm text-slate-600"><span class="font-medium">Email:</span> <span id="info-customer-email">—</span></p>
              <p class="text-sm text-slate-600"><span class="font-medium">National ID:</span> <span id="info-customer-national-id">—</span></p>
              <p class="text-sm text-slate-600"><span class="font-medium">Face Status:</span> <span id="info-face-status">—</span></p>
            </div>

            <button id="start-scan-button" disabled
                    class="w-full rounded-lg bg-indigo-600 py-3 text-sm font-semibold text-white transition hover:bg-indigo-700 disabled:cursor-not-allowed disabled:opacity-50">
              Start Face Scan
            </button>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="js/database.js"></script>
  <script src="js/common.js"></script>
  <script src="js/faceid.js"></script>
</body>
</html>
