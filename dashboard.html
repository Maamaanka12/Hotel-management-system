<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Hotel Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        hotel: {
                            primary: '#1e3a5f',
                            secondary: '#2d5a27',
                            accent: '#c4a747',
                            light: '#f4f1e8'
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50">
    <!-- Navigation -->
    <nav class="bg-hotel-primary shadow-lg">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center space-x-3">
                    <span class="text-2xl">🏨</span>
                    <span class="text-white text-xl font-bold">Grand Horizon Hotel</span>
                </div>
                <div class="flex items-center space-x-4">
                    <span id="currentUserName" class="text-gray-200"></span>
                    <button onclick="handleLogout()" class="bg-red-500 text-white px-4 py-2 rounded-lg hover:bg-red-600 transition duration-300 text-sm font-semibold">
                        Logout
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Sidebar and Main Content -->
    <div class="flex">
        <!-- Sidebar -->
        <aside class="w-64 bg-white shadow-lg min-h-screen">
            <nav class="mt-6">
                <a href="dashboard.html" class="flex items-center px-6 py-3 text-hotel-primary bg-blue-50 border-l-4 border-hotel-primary font-semibold">
                    <span class="text-xl mr-3">📊</span>
                    Dashboard
                </a>
                <a href="rooms.html" class="flex items-center px-6 py-3 text-gray-600 hover:bg-gray-50 hover:text-hotel-primary transition duration-200">
                    <span class="text-xl mr-3">🚪</span>
                    Rooms
                </a>
                <a href="customers.html" class="flex items-center px-6 py-3 text-gray-600 hover:bg-gray-50 hover:text-hotel-primary transition duration-200">
                    <span class="text-xl mr-3">👥</span>
                    Customers
                </a>
                <a href="bookings.html" class="flex items-center px-6 py-3 text-gray-600 hover:bg-gray-50 hover:text-hotel-primary transition duration-200">
                    <span class="text-xl mr-3">📅</span>
                    Bookings
                </a>
                <a href="payments.html" class="flex items-center px-6 py-3 text-gray-600 hover:bg-gray-50 hover:text-hotel-primary transition duration-200">
                    <span class="text-xl mr-3">💳</span>
                    Payments
                </a>
                <div class="border-t border-gray-200 my-4"></div>
                <a href="faceid.html" class="flex items-center px-6 py-3 text-gray-600 hover:bg-gray-50 hover:text-hotel-primary transition duration-200">
                    <span class="text-xl mr-3">👤</span>
                    Face ID
                </a>
                <a href="controls.html" class="flex items-center px-6 py-3 text-gray-600 hover:bg-gray-50 hover:text-hotel-primary transition duration-200">
                    <span class="text-xl mr-3">🎛️</span>
                    Room Controls
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 p-8">
            <!-- Page Title -->
            <div class="mb-8">
                <h1 class="text-3xl font-bold text-gray-800">Dashboard</h1>
                <p class="text-gray-600 mt-1">Overview of hotel operations</p>
            </div>

            <!-- Statistics Cards -->
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                <!-- Total Rooms -->
                <div class="bg-white rounded-xl shadow-md p-6 hover:shadow-lg transition-shadow duration-300">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-gray-500 text-sm font-semibold uppercase">Total Rooms</p>
                            <p id="totalRooms" class="text-3xl font-bold text-gray-800 mt-2">0</p>
                        </div>
                        <div class="bg-blue-100 p-3 rounded-full">
                            <span class="text-3xl">🚪</span>
                        </div>
                    </div>
                </div>

                <!-- Available Rooms -->
                <div class="bg-white rounded-xl shadow-md p-6 hover:shadow-lg transition-shadow duration-300">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-gray-500 text-sm font-semibold uppercase">Available</p>
                            <p id="availableRooms" class="text-3xl font-bold text-green-600 mt-2">0</p>
                        </div>
                        <div class="bg-green-100 p-3 rounded-full">
                            <span class="text-3xl">✅</span>
                        </div>
                    </div>
                </div>

                <!-- Booked Rooms -->
                <div class="bg-white rounded-xl shadow-md p-6 hover:shadow-lg transition-shadow duration-300">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-gray-500 text-sm font-semibold uppercase">Booked</p>
                            <p id="bookedRooms" class="text-3xl font-bold text-red-600 mt-2">0</p>
                        </div>
                        <div class="bg-red-100 p-3 rounded-full">
                            <span class="text-3xl">🔴</span>
                        </div>
                    </div>
                </div>

                <!-- Total Customers -->
                <div class="bg-white rounded-xl shadow-md p-6 hover:shadow-lg transition-shadow duration-300">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-gray-500 text-sm font-semibold uppercase">Customers</p>
                            <p id="totalCustomers" class="text-3xl font-bold text-gray-800 mt-2">0</p>
                        </div>
                        <div class="bg-purple-100 p-3 rounded-full">
                            <span class="text-3xl">👥</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Recent Bookings Table -->
            <div class="bg-white rounded-xl shadow-md p-6">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-bold text-gray-800">Recent Bookings</h2>
                    <a href="bookings.html" class="text-hotel-primary hover:text-blue-700 font-semibold text-sm">View All →</a>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full">
                        <thead>
                            <tr class="text-left text-gray-600 border-b-2 border-gray-200">
                                <th class="pb-3 font-semibold">Guest</th>
                                <th class="pb-3 font-semibold">Room</th>
                                <th class="pb-3 font-semibold">Check-In</th>
                                <th class="pb-3 font-semibold">Check-Out</th>
                                <th class="pb-3 font-semibold">Status</th>
                            </tr>
                        </thead>
                        <tbody id="recentBookingsTableBody">
                            <tr>
                                <td colspan="5" class="text-center py-8 text-gray-500">No bookings yet</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="database.js"></script>
    <script src="dashboard.js"></script>
</body>
</html>
